<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CANPAC Countdown — 9449 Yellowjackets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --neon-yellow: #ffe600;
      --dark-bg: #050505;
      --glow: 0 0 10px rgba(255, 230, 0, 0.8),
              0 0 20px rgba(255, 230, 0, 0.6),
              0 0 40px rgba(255, 230, 0, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #111 0%, #000 70%);
      color: var(--neon-yellow);
      font-family: 'Orbitron', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      margin-bottom: 0.5rem;
      text-shadow: var(--glow);
      letter-spacing: 0.08em;
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      opacity: 0.85;
      margin-bottom: 2rem;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1.2rem;
    }

    .time-box {
      border: 2px solid var(--neon-yellow);
      border-radius: 16px;
      padding: 1.2rem 0.8rem;
      background: rgba(255, 230, 0, 0.03);
      box-shadow: var(--glow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .time-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 15px rgba(255, 230, 0, 1),
                  0 0 35px rgba(255, 230, 0, 0.7);
    }

    .number {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 700;
      text-shadow: var(--glow);
    }

    .label {
      margin-top: 0.3rem;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .countdown {
        gap: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CANPAC</h1>
    <div class="subtitle">
      March 4–7, 2026 · Pacific Time<br>
      9449 Yellowjackets 🐝
    </div>

    <div class="countdown" id="countdown">
      <div class="time-box">
        <div class="number" id="days">0</div>
        <div class="label">DAYS</div>
      </div>
      <div class="time-box">
        <div class="number" id="hours">0</div>
        <div class="label">HOURS</div>
      </div>
      <div class="time-box">
        <div class="number" id="minutes">0</div>
        <div class="label">MINUTES</div>
      </div>
      <div class="time-box">
        <div class="number" id="seconds">0</div>
        <div class="label">SECONDS</div>
      </div>
    </div>

    <div class="footer">
      Countdown to kickoff — stay sharp ⚡
    </div>
  </div>

  <script>
    // CANPAC start: March 4, 2026 00:00 Pacific Time (UTC-08:00)
    const canpacStart = new Date("2026-03-04T00:00:00-08:00").getTime();

    function updateCountdown() {
      const now = Date.now();
      const diff = canpacStart - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerHTML =
          "<h2 style='text-shadow: var(--glow);'>CANPAC HAS BEGUN 🐝🔥</h2>";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours.toString().padStart(2, "0");
      document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
      document.getElementById("seconds").textContent = seconds.toString().padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
